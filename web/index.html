<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Person Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            margin: 0;
        }

        header {
            background: #020617;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 6px 12px;
            margin-left: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .view { background: #38bdf8; }
        .edit { background: #22c55e; }
        .delete { background: #ef4444; color: white; }

        .add-btn {
            background: #00a8ff;
            color: white;
            padding: 10px 15px;
            margin-top: 20px;
        }

        .form {
            display: none;
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>

<body>

<header>Smart Person Manager</header>

<div class="container">

    <!-- Dashboard -->
    <div id="dashboard"></div>

    <button class="add-btn" onclick="showForm()">➕ Add Person</button>

    <!-- Form -->
    <div class="form" id="form">
        <h3>Add Person</h3>

        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="mobile" placeholder="Mobile Number">
        <input type="text" id="email" placeholder="Email">

        <button onclick="savePerson()">💾 Save</button>
    </div>

</div>

<script>
    let persons = [];

    function generateID() {
        return Math.random().toString(36).substr(2, 8);
    }

    function showForm() {
        document.getElementById("form").style.display = "block";
    }

    function savePerson() {
        const name = document.getElementById("name").value;
        const mobile = document.getElementById("mobile").value;
        const email = document.getElementById("email").value;

        const id = generateID();

        persons.push({ id, name, mobile, email });

        renderDashboard();
        document.getElementById("form").style.display = "none";
    }

    function deletePerson(id) {
        persons = persons.filter(p => p.id !== id);
        renderDashboard();
    }

    function renderDashboard() {
        const dash = document.getElementById("dashboard");
        dash.innerHTML = "";

        persons.forEach(p => {
            dash.innerHTML += `
                <div class="card">
                    <div>${p.id} - ${p.name}</div>
                    <div>
                        <button class="view">View</button>
                        <button class="edit">Edit</button>
                        <button class="delete" onclick="deletePerson('${p.id}')">Delete</button>
                    </div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
